name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Smart Build (Gradlew Olmadan Derle)
      run: |
        # Projenin build.gradle dosyasını bulup o klasöre girelim
        BUILD_FILE=$(find . -name "build.gradle*" | head -n 1)
        if [ -z "$BUILD_FILE" ]; then
          echo "HATA: Projede build.gradle dosyası hiçbir yerde bulunamadı!"
          exit 1
        fi
        
        PROJECT_DIR=$(dirname "$BUILD_FILE")
        echo "Proje dizini bulundu: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # Eğer gradlew varsa onu kullan, yoksa sunucudaki kurulu Gradle ile derle
        if [ -f "gradlew" ]; then
          echo "gradlew bulundu, yerel gradle ile derleniyor..."
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "gradlew bulunamadı! Sunucudaki global Gradle ile derleme başlatılıyor..."
          gradle assembleDebug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
